<!DOCTYPE html>
<html>
<head>
<style>
html{
	scroll-behavior: smooth;
	min-height: 100vh;
}
*{
	margin: 0px;
	padding: 0px;
	color: #444444;
	font-family: "Roboto", sans-serif;
}
@keyframes dpAnimation{
	from {opacity: 0}
	to {animation-delay: 4s; opacity:1}
}

@keyframes displayIconAnimation{
	from {opacity: 0}
	to {opacity: 1}
}

body{
	background-color: #cccccc;
	/*background-image: url("https://plus.unsplash.com/premium_vector-1761422865384-e4e44fc247a3?q=80&w=1151&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");*/
	/*background-image: url("src/background_img.png");*/
	background-size: cover;
	background-position: center center;
	background-attachment: fixed;
	
}

.container{
	display: flex;
	flex-direction: column;
}

.container2{
	display: flex;
	flex-direction: column;
	padding: 0px 200px;
	/*background-color: powderblue;*/
	margin-top: -4vh;
}

.container1{
	position: sticky;
	top: 0;
	left: 0;
	right: 0;
	margin-bottom: 2em;
	z-index: 1000;
}

nav ul{
	display: flex;
	background-color: #f0f0f090;
	height: 3.2rem;
	justify-content: center;
	align-items: center;
	gap: 2em;
	list-style: none;
	backdrop-filter: blur(4px);
}

nav ul li{
	
}

nav ul li a{
	text-decoration: none;
	text-transform: uppercase;
	color: #444444;
}

nav ul li a:hover{
	
}

.card{
	height: 100vh;
	scroll-margin-top: 10vh;
	display: flex;
	flex-direction: column;
	/*gap: 10px;*/
	background-color: #f0f0f090;
	backdrop-filter: blur(10px);
	padding: 24px 32px;
	border-radius: 16px;
	/*translate: -100px 0px;*/
	opacity: 0;
	transition: 800ms ease;
	
}

.card.show{
	opacity: 1;
	/*translate: 0px 0px;*/
}


.card_header{
	font-weight: bold;
	font-size: 24px;
}
.card.show .intro{
	position: fixed;
	left: 16vh;
	top: 16vh;
	background-color: lightgreen;
	margin: 16px;
	padding: 16px;
	border-radius: 8px;
	box-shadow: #999999 2px 2px 4px;
	z-index: 1000;
}
.card.show .dp{
	background-image: url("https://png.pngtree.com/png-vector/20231019/ourmid/pngtree-user-profile-avatar-png-image_10211467.png");
	background-size: cover;
	background-position: center center;
	margin-top: -16vh;
	background-color: #f0f0f0;
	height: 16em;
	width: 16em;
	border-radius: 16em;
	/*animation-name: dpAnimation;*/
	/*animation-duration: 4s;*/
}

.display_icon{
	
}

.card.show .display_icon{
	position: fixed;
	background-color: powderblue;
	height: 4em;
	width: 4em;
	border-radius: 4em;
	margin: 4px;
	box-shadow: #999999 2px 2px 4px;
	animation: displayIconAnimation 2s;
	
}

.card.show #display_icon1{
	top: 8em;
	right: 14em;
}

.card.show #display_icon2{
	top: 15em;
	right: 12em;
}

.card.show #display_icon3{
	top: 22em;
	right: 14em;
}

#home{
	align-items: center;
	justify-content: center;
}

.right_panel{
	position: fixed;
	z-index: 1000;
	right: 8px;
	top: 48vh;
	display: flex;
	flex-direction: column;
	gap: 4px;
}

.right_panel div{
	background-color: #f0f0f0;
	height: 1em;
	width: 1em;
	border-radius: 1em;
	
}

</style>
<script src="./src/main.js"></script>
<title>Koushik Saha</title>
</head>
<body onLoad=onLoad()>
	<div class="container" id="container">
		<div class="container1" id="container1">
			<nav class="header">
			<ul>
				<li class="ul_menu_item"><a href="#home">Home</a></li>
				<li class="ul_menu_item"><a href="#about">About</a></li>
				<li class="ul_menu_item"><a href="#project">Project</a></li>
				<li class="ul_menu_item"><a href="#skill">Skills</a></li>
				<li class="ul_menu_item"><a href="#contact">Contact</a></li>
			</ul>
		</nav>
		</div>
		<div class="container2" id="container2">
			<section class="card" id="home">
				<div class="intro" id="intro">
					<p>Hello! I'm Koushik.</p>
					<p>Glad, you're here.</p>
				
				</div>
				<div class="card_header" id="card_header">
					<div class="dp" id="dp"></div>
				</div>
				<div class="display_icon" id="display_icon1"></div>
				<div class="display_icon" id="display_icon2"></div>
				<div class="display_icon" id="display_icon3"></div>
			</section>
			<section class="card" id="about">
				<div class="card_header" id="card_header"></div>
			</section>
			<section class="card" id="project">
				<div class="card_header" id="card_header"></div>
			</section>
			<section class="card" id="skill">
				<div class="card_header" id="card_header"></div>
			</section>
			<section class="card" id="contact">
				<div class="card_header" id="card_header"></div>
			</section>
			<div></div>
			<div class="right_panel" id="right_panel">
				<div></div>
				<div></div>
				<div></div>
				<div></div>
				<div></div>
			</div>
			<div class="left_panel" id="left_panel">
				<div></div>
				<div></div>
				<div></div>
			</div>
		</div>
	</div>
</body>
</html>
